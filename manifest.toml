packaging_format = 2

id = "miniflux"
name = "Miniflux"
description.en = "Minimalist and opinionated RSS feed reader"
description.fr = "Agrégateur de flux RSS minimaliste"

version = "2.3.0~ynh1"

maintainers = ["eric_G"]

[upstream]
license = "Apache-2.0"
website = "https://miniflux.app/"
admindoc = "https://miniflux.app/docs/index.html"
code = "https://github.com/miniflux/v2"

[integration]
yunohost = ">= 12.1.38"
helpers_version = "2.1"
architectures = ["amd64", "armhf", "arm64"]
multi_instance = true

ldap = false
sso = true

disk = "50M"
ram.build = "100M"
ram.runtime = "60M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/miniflux"

    [install.admin]
    type = "user"

    [install.password]
    help.en = "Password must be more than 6 characters."
    help.fr = "Le mot de passe doit contenir plus de 6 caractères."
    type = "password"

    [install.init_main_permission]
    help.en = "If set to visitors, Miniflux will be accessible by people who do not have an account. This can be changed later via the webadmin."
    help.fr = "Si visiteurs sélectionnée, Miniflux sera accessible aux personnes n’ayant pas de compte. Vous pourrez changer ceci plus tard via la webadmin."
    type = "group"
    default = "visitors"

[resources]
        [resources.sources.main]
        in_subdir = false
        extract = false
        rename = "miniflux"

        amd64.url = "https://github.com/miniflux/v2/releases/download/2.3.0/miniflux-linux-amd64"
        amd64.sha256 = "57d06d2344c9eabd3981830820fd455c4b9002e24910fcefc55e6950c3811f73"
        arm64.url = "https://github.com/miniflux/v2/releases/download/2.3.0/miniflux-linux-arm64"
        arm64.sha256 = "5461b7c96f3815bafea631d31d94f9c2a10a5b41e6d1dffb4e47576266e5dbed"
        armhf.url = "https://github.com/miniflux/v2/releases/download/2.3.0/miniflux-linux-armv7"
        armhf.sha256 = "791757ac346cc65a1945f2d0d389d338f52ba9124fafa9ab5abb0720ec7ad5db"
        
        autoupdate.strategy = "latest_github_release"
        autoupdate.asset.amd64 = "^miniflux-linux-amd64$"
        autoupdate.asset.arm64 = "^miniflux-linux-arm64$"
        autoupdate.asset.armhf = "^miniflux-linux-armv7$"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"
    api.url = "/v1"
    api.show_tile = false
    api.allowed = "visitors"
    api.auth_header = false

    [resources.ports]
    
    [resources.apt]
    packages = "postgresql"

    [resources.database]
    type = "postgresql"
